<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Finder</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" type="text/css" href="styles.css">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body class="font-inter bg-cover bg-center bg-no-repeat min-h-screen flex flex-col" style="background-image: url('book1 (2).jpg');">
    <!-- Main content wrapper -->
    <div class="flex-grow flex flex-col justify-center items-center p-4">
        <!-- Title and Search Bar Section -->
        <div class="text-center bg-white bg-opacity-10 backdrop-blur-sm p-8 rounded-xl shadow-lg glow-effect max-w-xl w-full">
            <h1 id="title" class="text-white text-5xl md:text-6xl font-extrabold mb-8 drop-shadow-lg">Book Finder</h1>
            <div id="input" class="flex items-center justify-center w-full">
                <input id="search-box" type="text" class="form-control flex-grow p-4 rounded-l-lg border-none focus:ring-4 focus:ring-blue-500 focus:outline-none text-lg transition duration-300 ease-in-out" placeholder="Search for a book...">
                <button id="search" class="btn btn-primary bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-r-lg transition duration-300 ease-in-out shadow-md">
                    Search
                </button>
            </div>
        </div>

        <!-- Search Result Section -->
        <div class="book-list hidden mt-10 w-full max-w-6xl">
            <h2 class="text-center text-white text-4xl font-bold mb-6 drop-shadow-lg">Search Results</h2>
            <div id="list-output" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6 p-4 rounded-xl bg-white bg-opacity-10 backdrop-blur-sm shadow-lg">
                <!-- Book cards will be injected here by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="message-box" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full">
            <p id="message-content" class="text-lg font-semibold mb-4"></p>
            <button id="message-close" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-300">OK</button>
        </div>
    </div>

    <!-- Script for functionality -->
    <script src="script.js"></script>
</body>
</html>
